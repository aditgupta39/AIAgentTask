<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Simple Site with Contact Tab</title>
		<link rel="stylesheet" href="index.css" />
	</head>
	<body>
		<header>
			<h1>Simple Site</h1>
			<nav class="tabs" role="tablist">
				<button class="tab" data-target="home" aria-selected="true">Home</button>
				<button class="tab" data-target="about" aria-selected="false">About</button>
				<button class="tab" data-target="contact" aria-selected="false">Contact</button>
			</nav>
		</header>

		<main>
			<section id="home" class="panel" role="tabpanel">
				<h2>Welcome</h2>
				<p>This is a simple HTML file. It contains a heading and a paragraph.</p>
			</section>

			<section id="about" class="panel" role="tabpanel" hidden>
				<h2>About</h2>
				<p>Use this small site as a starting point. Add pages, styles, and functionality as needed.</p>
			</section>

			<section id="contact" class="panel" role="tabpanel" hidden>
				<h2>Contact</h2>
				<p>If you'd like to get in touch, fill out the form below.</p>
				<form id="contact-form">
					<label for="name">Name</label>
					<input type="text" id="name" name="name" required />

					<label for="email">Email</label>
					<input type="email" id="email" name="email" required />

					<label for="message">Message</label>
					<textarea id="message" name="message" rows="5" required></textarea>

					<button type="submit">Send</button>
				</form>
				<div id="contact-feedback" aria-live="polite" style="margin-top:12px"></div>
			</section>
		</main>

		<script>
			// Simple tab switching
			const tabs = document.querySelectorAll('.tab');
			const panels = document.querySelectorAll('.panel');

			function showPanel(id) {
				panels.forEach(p => {
					if (p.id === id) { p.hidden = false; } else { p.hidden = true; }
				});
				tabs.forEach(t => t.setAttribute('aria-selected', t.dataset.target === id));
			}

			tabs.forEach(t => {
				t.addEventListener('click', () => showPanel(t.dataset.target));
			});

			// Contact form handler (demo-only — does not send emails)
			const form = document.getElementById('contact-form');
			const feedback = document.getElementById('contact-feedback');
			form.addEventListener('submit', (e) => {
				e.preventDefault();
				const data = new FormData(form);
				// In a real site you'd send this to a server. Here we just show a message.
				feedback.textContent = `Thanks, ${data.get('name')}! We'll contact you at ${data.get('email')}.`;
				form.reset();
			});
		</script>
	</body>
</html>
